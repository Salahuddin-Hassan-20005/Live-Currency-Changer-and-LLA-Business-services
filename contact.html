<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | GlobalBridge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar container">
        <a class="brand" href="index.html">GlobalBridge</a>
        <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">Menu</button>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">Home</a></li>
          <li><a href="services.html">LLC Services</a></li>
          <li><a href="rates.html">Currency Rates</a></li>
          <li><a href="about.html">About</a></li>
          <li><a class="active" href="contact.html">Contact</a></li>
          <li><a href="auth.html">Login / Sign Up</a></li>
        </ul>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark and light mode">
          <span id="themeText">Dark Mode</span>
        </button>
      </nav>
    </header>

    <main class="container section">
      <h1>Contact Us</h1>
      <p class="section-intro">
        Tell us your preferred country of formation and target timeline. We will recommend a package.
      </p>

      <section class="card form-card">
        <form id="contactForm">
          <div class="form-grid">
            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" placeholder="Your name" required />
            <label for="emailAddress">Email</label>
            <input id="emailAddress" type="email" placeholder="you@example.com" required />
            <label for="message">Message</label>
            <textarea id="message" rows="5" placeholder="Tell us about your business goals" required></textarea>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Submit Inquiry</button>
          </div>
          <p id="contactStatus" class="contact-status" aria-live="polite"></p>
        </form>
      </section>

    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 GlobalBridge. All rights reserved.</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
